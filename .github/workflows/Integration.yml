name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Automatically cancel in-progress runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read ## Secure: only give the runner what it need.

jobs:
  build:
    strategy:
      fail-fast: false # Don't kill all jobs if one Go Version fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go_version: ['1.22', '1.23', '1.24', '1.25']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version }}
          cache: true # Professional touch: caches dependencies automatically
          check-latest: true

      - name: Verify dependencies
        run: go mod verify

      - name: build
        env:
          CGO_ENABLED: 0
        run: go build -v -o goApp ./...

      - name: Run Tests
        run: go test

      - name: integration Test
        shell: bash
        run: |
          ./goApp &
          res=$(curl localhost:3000)
          [[ $res == 'Hello, World!' ]]

  docker-build:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t my-app:${{ github.sha }} .
