name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Cross-compile Go binaries for every
  #          supported platform / architecture
  # ─────────────────────────────────────────────
  build-binaries:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
          - {goos: linux, goarch: arm, goarm: "7"}
          # Windows
          - {goos: windows, goarch: amd64, ext: ".exe"}
          - {goos: windows, goarch: arm64, ext: ".exe"}
          # macOS
          - {goos: darwin, goarch: amd64}
          - {goos: darwin, goarch: arm64}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          APP="devops-docker-demo"
          VERSION="${GITHUB_REF_NAME}"
          BINARY="${APP}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"

          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -trimpath \
            -o "${BINARY}" \
            .

          echo "BINARY=${BINARY}" >> $GITHUB_ENV

      - name: Package binary
        run: |
          BASE="${BINARY%${{ matrix.ext }}}"   # strip .exe for archive name

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${BASE}.zip" "${BINARY}"
            echo "ASSET=${BASE}.zip" >> $GITHUB_ENV
          else
            tar -czf "${BASE}.tar.gz" "${BINARY}"
            echo "ASSET=${BASE}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2 — Build multi-arch Docker image and
  #          push to Docker Hub
  # ─────────────────────────────────────────────
  docker-release:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-docker-demo
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3 — Collect all artifacts, generate
  #          checksums, and publish the release
  # ─────────────────────────────────────────────
  create-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo "── Checksums ──────────────────────────────────────"
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Installation

            Download the pre-built binary for your platform from the assets below,
            or pull the official Docker image.

            | Platform       | Architecture       | Archive                                                                                   |
            |----------------|--------------------|-------------------------------------------------------------------------------------------|
            | Linux          | x86-64 (amd64)     | `devops-docker-demo-${{ github.ref_name }}-linux-amd64.tar.gz`                            |
            | Linux          | ARM 64-bit         | `devops-docker-demo-${{ github.ref_name }}-linux-arm64.tar.gz`                            |
            | Linux          | ARM v7 (32-bit)    | `devops-docker-demo-${{ github.ref_name }}-linux-arm.tar.gz`                              |
            | Windows        | x86-64 (amd64)     | `devops-docker-demo-${{ github.ref_name }}-windows-amd64.zip`                             |
            | Windows        | ARM 64-bit         | `devops-docker-demo-${{ github.ref_name }}-windows-arm64.zip`                             |
            | macOS          | Intel (amd64)      | `devops-docker-demo-${{ github.ref_name }}-darwin-amd64.tar.gz`                           |
            | macOS          | Apple Silicon      | `devops-docker-demo-${{ github.ref_name }}-darwin-arm64.tar.gz`                           |

            ### Docker

            ```sh
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-docker-demo:${{ github.ref_name }}
            ```

            ### Verify your download

            All release assets are accompanied by a `checksums.txt` file containing SHA-256 hashes.

            ```sh
            # Linux / macOS
            sha256sum --check checksums.txt

            # macOS (shasum)
            shasum -a 256 --check checksums.txt
            ```

            ---
            > **Full changelog** is auto-generated below from merged pull requests and commits.
          files: |
            dist/**
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
