name: Release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    name: Build & Push Docker
    runs-on: ubuntu-latest

    # only run the push if we are on main or a tag, not for every PR check
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. Extract metadata (tags, labels) for Docker
      # This is the "Pro" way to handle versioning automatically
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-docker-demo
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=ref,event=branch
            latest

      # 2. Setup Buildx (The "Turbo" builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 3. Secure Login using official action
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build and Push in ONE step
      # This handles the versioning and pushing automatically
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
